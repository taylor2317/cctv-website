<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>

  <link rel="stylesheet" href="/style.css">

  <script defer src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <script defer src="/script.js"></script>
</head>
<body>
  <div class="background-shapes" aria-hidden="true"></div>
  <div class="particles"></div>

  <header>
    <h1>CCTV Dashboard</h1>

    <div class="top-buttons">
      <button id="exportBtn">Export Data</button>
      <button id="clearBtn" class="secondary">Clear Data</button>
      <button id="logoutBtn" class="secondary">Logout</button>
    </div>
  </header>

  <main class="dashboard-layout">

    <section class="camera-panel">

      <div class="camera-panel-header">
        <h2>Live Cameras</h2>
        <p class="camera-note">Click any preview to enlarge</p>
      </div>

      <div id="cameraGrid" class="camera-grid"></div>

    </section>

    <aside class="sidebar">

      <h2>CCTV Visitor Database</h2>

      <div id="log"></div>

    </aside>

  </main>

  <!-- FULLSCREEN MODAL -->

  <div id="fullscreenModal" class="fullscreen-modal">

    <div class="fullscreen-content">

      <div class="fullscreen-header">
        <div>
          <h2 id="fullscreenTitle">Camera</h2>
          <div id="fullscreenStatus" class="fullscreen-status">Live</div>
        </div>

        <div class="header-buttons">
          <button id="fullscreenSettingsBtn" class="secondary" type="button">
            Settings
          </button>
          <button id="closeFullscreen" type="button">
            Close
          </button>
        </div>
      </div>

      <video
        id="fullscreenVideo"
        autoplay
        muted
        playsinline
      ></video>

      <div id="settingsPanel" class="settings-panel">
        <label class="settings-field">
          <span>Camera Name</span>
          <input id="cameraNameInput" type="text" placeholder="Enter camera name">
        </label>

        <div class="settings-actions">
          <button id="renameCameraBtn" type="button">Rename</button>
          <button id="toggleEnabledBtn" type="button">Disable Camera</button>
        </div>

        <div class="settings-flip-group">
          <button id="toggleFlipHBtn" type="button">Flip Horizontal</button>
          <button id="toggleFlipVBtn" type="button">Flip Vertical</button>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
