<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Security Camera - Login</title>

  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div class="login-page">

    <div class="login-box">

      <h1>AI Security Camera</h1>

      <input
        id="username"
        type="text"
        placeholder="Username"
      >

      <input
        id="password"
        type="password"
        placeholder="Password"
      >

      <div class="login-buttons">
        <button id="loginBtn">
          Login
        </button>

        <button id="registerBtn">
          Register
        </button>
      </div>

    </div>

  </div>

  <script>

    let loading = false;

    // ---------------- API ----------------
    async function api(path, options = {}) {

      const res = await fetch("/api" + path, {
        ...options,
        headers: {
          "Content-Type": "application/json"
        },
        credentials: "include"
      });

      let data = {};

      try {
        data = await res.json();
      } catch {}

      return {
        ok: res.ok,
        status: res.status,
        data
      };
    }

    // ---------------- CHECK AUTH ----------------
    async function checkAuth() {

      const res = await api("/me");

      if (res.ok && res.data.user) {

        // SINGLE REDIRECT ONLY
        window.location.replace("/dashboard");
      }
    }

    // ---------------- LOGIN ----------------
    document.getElementById("loginBtn").onclick =
    async () => {

      if (loading) return;

      loading = true;

      const username =
        document.getElementById("username").value;

      const password =
        document.getElementById("password").value;

      const res = await api("/login", {
        method: "POST",
        body: JSON.stringify({
          username,
          password
        })
      });

      loading = false;

      if (res.ok) {

        // WAIT FOR SESSION COOKIE
        setTimeout(() => {

          window.location.href = "/dashboard";

        }, 300);

      } else {

        alert("Invalid username or password");
      }
    };

    // ---------------- REGISTER ----------------
    document.getElementById("registerBtn").onclick =
    async () => {

      if (loading) return;

      loading = true;

      const username =
        document.getElementById("username").value;

      const password =
        document.getElementById("password").value;

      const res = await api("/register", {
        method: "POST",
        body: JSON.stringify({
          username,
          password
        })
      });

      loading = false;

      if (res.ok) {

        alert("Account created");

      } else {

        alert(
          res.data.error ||
          "Registration failed"
        );
      }
    };

    // ---------------- START ----------------
    checkAuth();

  </script>

</body>
</html>
